<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#00ffcc">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Samarth Ultra Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#00c6ff;--gold:#ffd700;--bg1:#060b18;--glass:rgba(0,198,255,0.07);--glass-border:rgba(0,198,255,0.2);--success:#00ff88;--danger:#ff4444;--text:#e0f0ff}
.light-theme{--bg1:#e8f4f8;--glass:rgba(0,100,180,0.07);--glass-border:rgba(0,100,180,0.25);--text:#0a1a2e;--primary:#0077aa}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:var(--bg1);color:var(--text);height:100vh;overflow:hidden;transition:background .5s,color .5s}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,198,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,198,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;gap:20px}
.splash-logo{font-family:'Orbitron',monospace;font-size:clamp(36px,8vw,72px);font-weight:900;letter-spacing:16px;color:var(--primary);animation:pulseGlow 1.5s infinite alternate}
.splash-sub{font-size:14px;letter-spacing:6px;color:rgba(0,198,255,.5);text-transform:uppercase}
.splash-bar{width:200px;height:3px;background:rgba(0,198,255,.15);border-radius:99px;overflow:hidden;margin-top:10px}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#7fff00);border-radius:99px;animation:fillBar 2.3s ease forwards}
@keyframes fillBar{from{width:0}to{width:100%}}
@keyframes pulseGlow{from{text-shadow:0 0 10px var(--primary),0 0 30px rgba(0,198,255,.3)}to{text-shadow:0 0 30px var(--primary),0 0 80px rgba(0,198,255,.5)}}
.page{position:fixed;inset:0;display:none;justify-content:center;align-items:center;z-index:10;padding:16px}
.page.active{display:flex}
.page-full{position:fixed;inset:0;display:none;z-index:10;padding:16px;flex-direction:column}
.page-full.active{display:flex}
.card{width:100%;max-width:380px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:28px 24px;border-radius:24px;box-shadow:0 8px 60px rgba(0,0,0,.5);animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
h2{font-family:'Orbitron',monospace;font-size:18px;letter-spacing:4px;margin-bottom:20px;color:var(--primary);text-transform:uppercase}
input[type=text],input[type=password]{width:100%;padding:12px 16px;margin:6px 0;background:rgba(0,0,0,.3);border:1px solid var(--glass-border);border-radius:12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border-color .3s}
input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,198,255,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px 16px;margin:5px 0;border:none;border-radius:12px;font-family:'Orbitron',monospace;font-size:12px;letter-spacing:2px;cursor:pointer;transition:transform .15s;text-transform:uppercase;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#0077b6);color:#fff;box-shadow:0 4px 20px rgba(0,198,255,.25)}
.btn-danger{background:linear-gradient(135deg,var(--danger),#aa0000);color:#fff}
.btn-success{background:linear-gradient(135deg,var(--success),#009955);color:#000}
.btn-ghost{background:var(--glass);border:1px solid var(--glass-border);color:var(--text)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000}
.btn-sm{width:auto;padding:7px 14px;font-size:10px;margin:3px}
#calcPage{align-items:center}
.calc-card{width:100%;max-width:340px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(24px);padding:20px;border-radius:28px;box-shadow:0 8px 60px rgba(0,0,0,.6)}
.calc-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.calc-topbar span{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:var(--primary)}
.calc-topbar-actions{display:flex;gap:6px}
.icon-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);border-radius:10px;padding:6px 10px;cursor:pointer;font-size:14px;transition:background .2s}
.icon-btn:hover{background:rgba(0,198,255,.15)}
.calc-display{background:rgba(0,0,0,.5);border:1px solid var(--glass-border);border-radius:14px;padding:12px 16px;text-align:right;margin-bottom:14px}
.calc-expr{font-size:13px;color:rgba(0,198,255,.5);min-height:18px;font-family:'Rajdhani';letter-spacing:1px}
.calc-main{font-family:'Orbitron',monospace;font-size:28px;color:var(--primary);min-height:40px;word-break:break-all}
.calc-mem{font-size:11px;color:var(--gold);min-height:14px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.calc-btn{aspect-ratio:1;border:1px solid var(--glass-border);border-radius:14px;background:rgba(0,0,0,.3);color:var(--text);font-family:'Orbitron',monospace;font-size:14px;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center}
.calc-btn:active{transform:scale(.91)}
.calc-btn.op{background:rgba(0,198,255,.12);color:var(--primary);border-color:rgba(0,198,255,.3)}
.calc-btn.eq{background:linear-gradient(135deg,var(--primary),#0077b6);color:#fff;border:none}
.calc-btn.clr{background:rgba(255,68,68,.12);color:var(--danger);border-color:rgba(255,68,68,.3)}
.calc-btn.sp{background:rgba(255,215,0,.1);color:var(--gold);border-color:rgba(255,215,0,.3)}
.vault-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.vault-header h2{margin:0;flex:1}
.vault-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:12px;text-align:center}
.stat-num{font-family:'Orbitron',monospace;font-size:24px;color:var(--primary)}
.stat-label{font-size:11px;letter-spacing:2px;opacity:.6;text-transform:uppercase}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;overflow-y:auto;flex:1;padding-right:4px}
.photo-thumb{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:rgba(0,0,0,.3);border:1px solid var(--glass-border);transition:transform .2s}
.photo-thumb:hover{transform:scale(1.04)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .del-btn{position:absolute;top:4px;right:4px;background:rgba(255,0,0,.8);border:none;border-radius:6px;color:#fff;width:22px;height:22px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.photo-thumb:hover .del-btn{display:flex}
#viewer{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:1000}
#viewer.active{display:flex}
#viewer img{max-width:92vw;max-height:80vh;border-radius:16px;transition:opacity .25s}
.viewer-controls{position:absolute;bottom:24px;display:flex;gap:12px;align-items:center}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:50%;width:46px;height:46px;font-size:20px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
.viewer-nav.left{left:16px}
.viewer-nav.right{right:16px}
.viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,0,0,.7);border:none;border-radius:12px;color:#fff;width:40px;height:40px;font-size:18px;cursor:pointer}
.viewer-counter{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:6px 16px;font-size:13px;font-family:'Orbitron',monospace;letter-spacing:2px}
.note-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:12px;margin-bottom:8px;position:relative}
.note-title{font-family:'Orbitron';font-size:13px;color:var(--primary);margin-bottom:4px}
.note-body{font-size:13px;opacity:.8;white-space:pre-wrap;word-break:break-word}
.note-del{position:absolute;top:8px;right:8px;background:rgba(255,68,68,.15);border:none;border-radius:8px;color:var(--danger);padding:2px 8px;cursor:pointer;font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.95);border:1px solid var(--glass-border);color:var(--text);padding:12px 24px;border-radius:99px;font-size:14px;letter-spacing:1px;z-index:99999;backdrop-filter:blur(12px);transition:opacity .4s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.tab-bar{display:flex;gap:6px;margin-bottom:14px;background:rgba(0,0,0,.3);border-radius:12px;padding:4px}
.tab{flex:1;padding:8px;border:none;border-radius:10px;background:transparent;color:var(--text);font-family:'Orbitron';font-size:10px;letter-spacing:1px;cursor:pointer;transition:background .2s;opacity:.5}
.tab.active{background:var(--primary);color:#fff;opacity:1}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--glass-border)}
.switch-label{font-size:14px;letter-spacing:1px}
.switch{position:relative;width:44px;height:24px}
.switch input{display:none}
.switch-slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:99px;cursor:pointer;transition:background .3s}
.switch-slider::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s}
.switch input:checked+.switch-slider{background:var(--primary)}
.switch input:checked+.switch-slider::after{transform:translateX(20px)}
.pin-display{display:flex;justify-content:center;gap:12px;margin:20px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--glass-border);transition:background .2s,border-color .2s}
.pin-dot.filled{background:var(--primary);border-color:var(--primary)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{aspect-ratio:1;border:1px solid var(--glass-border);border-radius:16px;background:var(--glass);color:var(--text);font-family:'Orbitron';font-size:18px;cursor:pointer;transition:background .15s,transform .1s}
.pin-key:active{transform:scale(.9)}
.pin-key.del{font-size:14px;color:var(--danger)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px)}40%,80%{transform:translateX(10px)}}
.shake{animation:shake .4s ease}
.strength-bar{height:4px;border-radius:99px;background:rgba(255,255,255,.1);margin-top:4px;overflow:hidden}
.strength-fill{height:100%;border-radius:99px;transition:width .3s,background .3s}
textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--glass-border);border-radius:12px;color:var(--text);font-family:'Rajdhani';font-size:14px;padding:10px;resize:none;outline:none}
textarea:focus{border-color:var(--primary)}
.settings-section{margin-bottom:16px}
.settings-title{font-family:'Orbitron';font-size:11px;letter-spacing:3px;color:rgba(0,198,255,.5);margin-bottom:10px;text-transform:uppercase}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:.4;animation:scan 4s linear infinite;z-index:1;pointer-events:none}
@keyframes scan{from{top:0}to{top:100vh}}
.search-bar{display:flex;gap:8px;margin-bottom:10px}
*{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.history-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.history-item .expr{opacity:.6}
.history-item .result{font-family:'Orbitron';color:var(--primary);font-size:16px}
</style>
</head>
<body>
<div class="scan-line"></div>
<div id="splash">
  <div class="splash-logo">SAMARTH</div>
  <div class="splash-sub">Ultra Vault · Secure · Private</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>
<div class="page" id="authPage">
  <div class="card">
    <div class="tab-bar">
      <button class="tab active" id="tabLogin" onclick="switchAuthTab('login')">LOGIN</button>
      <button class="tab" id="tabRegister" onclick="switchAuthTab('register')">REGISTER</button>
    </div>
    <div id="loginForm">
      <h2>👤 Login</h2>
      <input type="text" id="logUser" placeholder="Username" autocomplete="off">
      <div style="position:relative">
        <input type="password" id="logPass" placeholder="Password" style="padding-right:44px">
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;opacity:.5" onclick="togglePw('logPass',this)">👁</span>
      </div>
      <button class="btn btn-primary" onclick="login()">🔑 SIGN IN</button>
      <button class="btn btn-ghost" onclick="guestLogin()">👤 Guest Mode</button>
    </div>
    <div id="registerForm" style="display:none">
      <h2>✨ Register</h2>
      <input type="text" id="regUser" placeholder="Choose username" autocomplete="off">
      <div style="position:relative">
        <input type="password" id="regPass" placeholder="Password (min 6 chars)" oninput="checkStrength(this)" style="padding-right:44px">
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;opacity:.5" onclick="togglePw('regPass',this)">👁</span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0;background:#ff4444"></div></div>
      <button class="btn btn-success" onclick="register()">🚀 CREATE ACCOUNT</button>
    </div>
  </div>
</div>
<div class="page" id="pinPage">
  <div class="card">
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:8px">🔐</div>
      <h2 style="text-align:center">VAULT PIN</h2>
      <div id="pinSubtitle" style="font-size:12px;opacity:.5;letter-spacing:2px;margin-bottom:6px">ENTER 4-DIGIT PIN</div>
      <div class="pin-display" id="pinDots">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
    </div>
    <div class="pin-pad" id="pinPad">
      <button class="pin-key" onclick="pinPress(1)">1</button><button class="pin-key" onclick="pinPress(2)">2</button><button class="pin-key" onclick="pinPress(3)">3</button>
      <button class="pin-key" onclick="pinPress(4)">4</button><button class="pin-key" onclick="pinPress(5)">5</button><button class="pin-key" onclick="pinPress(6)">6</button>
      <button class="pin-key" onclick="pinPress(7)">7</button><button class="pin-key" onclick="pinPress(8)">8</button><button class="pin-key" onclick="pinPress(9)">9</button>
      <button class="pin-key" onclick="backToCalc()">↩</button><button class="pin-key" onclick="pinPress(0)">0</button><button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div id="lockCountdown" style="text-align:center;color:var(--danger);font-size:12px;margin-top:8px;min-height:16px"></div>
  </div>
</div>
<div class="page" id="calcPage">
  <div class="calc-card">
    <div class="calc-topbar">
      <span>CALC-X</span>
      <div class="calc-topbar-actions">
        <button class="icon-btn" onclick="showHistory()">📋</button>
        <button class="icon-btn" onclick="toggleTheme()">🎨</button>
        <button class="icon-btn" onclick="showSettings()">⚙️</button>
        <button class="icon-btn" onclick="doLogout()">🚪</button>
      </div>
    </div>
    <div class="calc-display">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-main" id="calcMain">0</div>
      <div class="calc-mem" id="calcMem"></div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn clr" onclick="cPress('C')">C</button><button class="calc-btn sp" onclick="cPress('%')">%</button><button class="calc-btn sp" onclick="cPress('√')">√</button><button class="calc-btn op" onclick="cPress('/')">÷</button>
      <button class="calc-btn" onclick="cPress('7')">7</button><button class="calc-btn" onclick="cPress('8')">8</button><button class="calc-btn" onclick="cPress('9')">9</button><button class="calc-btn op" onclick="cPress('*')">×</button>
      <button class="calc-btn" onclick="cPress('4')">4</button><button class="calc-btn" onclick="cPress('5')">5</button><button class="calc-btn" onclick="cPress('6')">6</button><button class="calc-btn op" onclick="cPress('-')">−</button>
      <button class="calc-btn" onclick="cPress('1')">1</button><button class="calc-btn" onclick="cPress('2')">2</button><button class="calc-btn" onclick="cPress('3')">3</button><button class="calc-btn op" onclick="cPress('+')">+</button>
      <button class="calc-btn sp" onclick="cPress('±')">±</button><button class="calc-btn" onclick="cPress('0')">0</button><button class="calc-btn" onclick="cPress('.')">.</button><button class="calc-btn eq" onclick="cPress('=')">=</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="calc-btn sp btn-sm" style="flex:1;aspect-ratio:auto;padding:8px 0" onclick="cPress('M+')">M+</button>
      <button class="calc-btn sp btn-sm" style="flex:1;aspect-ratio:auto;padding:8px 0" onclick="cPress('MR')">MR</button>
      <button class="calc-btn sp btn-sm" style="flex:1;aspect-ratio:auto;padding:8px 0" onclick="cPress('MC')">MC</button>
      <button class="calc-btn sp btn-sm" style="flex:1;aspect-ratio:auto;padding:8px 0" onclick="cPress('x²')">x²</button>
    </div>
  </div>
</div>
<div class="page-full" id="vaultPage">
  <div style="max-width:600px;width:100%;margin:auto;height:100%;display:flex;flex-direction:column">
    <div class="vault-header">
      <button class="icon-btn" onclick="backToCalc()">←</button>
      <h2 style="margin:0">🔐 VAULT</h2>
      <div class="tab-bar" style="margin:0;flex:1;max-width:240px">
        <button class="tab active" id="vTabPhoto" onclick="switchVaultTab('photos')">📷 PHOTOS</button>
        <button class="tab" id="vTabNote" onclick="switchVaultTab('notes')">📝 NOTES</button>
      </div>
    </div>
    <div id="photoVault" style="display:flex;flex-direction:column;flex:1;min-height:0">
      <div class="vault-stats">
        <div class="stat-box"><div class="stat-num" id="statCount">0</div><div class="stat-label">Photos</div></div>
        <div class="stat-box"><div class="stat-num" id="statSize">0 KB</div><div class="stat-label">Storage</div></div>
      </div>
      <div class="search-bar">
        <button class="btn btn-primary" style="width:auto;margin:0" onclick="document.getElementById('photoInput').click()">📁 ADD</button>
        <input type="file" id="photoInput" multiple accept="image/*" style="display:none" onchange="uploadPhotos(event)">
        <button class="btn btn-danger" style="width:auto;margin:0" onclick="clearAllPhotos()">🗑 CLEAR</button>
        <button class="btn btn-gold" style="width:auto;margin:0" onclick="sortPhotos()">⟳ SORT</button>
      </div>
      <div class="photo-grid" id="gallery"></div>
    </div>
    <div id="noteVault" style="display:none;flex-direction:column;flex:1;min-height:0">
      <input id="noteTitle" placeholder="Note title..." style="margin-bottom:6px">
      <textarea id="noteBody" rows="3" placeholder="Write your secret note..."></textarea>
      <button class="btn btn-primary" onclick="saveNote()">💾 SAVE NOTE</button>
      <div style="overflow-y:auto;flex:1" id="notesList"></div>
    </div>
  </div>
</div>
<div class="page-full" id="intruderPage">
  <h2 style="text-align:center">🕵️ Intruder Alerts</h2>
  <div id="intruderList" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;overflow-y:auto"></div>
  <button onclick="clearIntruders()" style="margin:15px;padding:10px;width:90%;background:red;color:white;border:none;border-radius:10px">Clear All 🚫</button>
</div>
<div class="page-full" id="historyPage">
  <div style="max-width:500px;width:100%;margin:auto;height:100%;display:flex;flex-direction:column">
    <div class="vault-header">
      <button class="icon-btn" onclick="backToCalc()">←</button>
      <h2 style="margin:0">📋 HISTORY</h2>
      <button class="btn btn-danger btn-sm" style="width:auto" onclick="clearHistory()">🗑 CLEAR</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>
<div class="page-full" id="settingsPage">
  <div style="max-width:500px;width:100%;margin:auto;height:100%;overflow-y:auto">
    <div class="vault-header">
      <button class="icon-btn" onclick="backToCalc()">←</button>
      <h2 style="margin:0">⚙️ SETTINGS</h2>
    </div>
    <div class="card">
      <div class="settings-section">
        <div class="settings-title">Preferences</div>
        <div class="switch-row"><span class="switch-label">Sound Effects</span><label class="switch"><input type="checkbox" id="soundToggle" checked onchange="saveSetting('sound',this.checked)"><div class="switch-slider"></div></label></div>
        <div class="switch-row"><span class="switch-label">Auto Logout (2 min)</span><label class="switch"><input type="checkbox" id="autoLogoutToggle" checked onchange="saveSetting('autoLogout',this.checked)"><div class="switch-slider"></div></label></div>

let actx=new(window.AudioContext||window.webkitAudioContext)();
function safeResume(){if(actx.state==='suspended')actx.resume();}
function resumeAudio(){if(actx.state==='suspended')actx.resume();}
function playBeep(freq=880,dur=0.08,type='sine',vol=0.2){
  if(!settings.sound)return;
  try{safeResume();const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.setValueAtTime(freq,actx.currentTime);g.gain.setValueAtTime(0.001,actx.currentTime);g.gain.exponentialRampToValueAtTime(vol,actx.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);}catch(e){}
}
function playSuccess(){if(!settings.sound)return;safeResume();playBeep(600,0.08,'sine',0.15);setTimeout(()=>playBeep(800,0.1,'sine',0.18),80);setTimeout(()=>playBeep(1000,0.12,'sine',0.2),160);}
function playError(){if(!settings.sound)return;try{safeResume();const now=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(150,now+0.5);g.gain.setValueAtTime(0.001,now);g.gain.exponentialRampToValueAtTime(0.5,now+0.02);g.gain.exponentialRampToValueAtTime(0.001,now+0.5);o.connect(g);g.connect(actx.destination);o.start(now);o.stop(now+0.5);}catch(e){}}
function playKey(){if(!settings.sound)return;playBeep(900,0.03,'sine',0.06);}
function playClick(){if(!settings.sound)return;playBeep(500,0.05,'square',0.06);}
function playVault(){if(!settings.sound)return;safeResume();[400,550,700,900].forEach((f,i)=>setTimeout(()=>playBeep(f,0.12,'sine',0.12),i*90));}

function stopCamera(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}}

  try{cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});const v=document.getElementById('camera');v.srcObject=cameraStream;await v.play();}catch(e){}
}
async function captureIntruder(){
  const v=document.getElementById('camera'),c=document.getElementById('snapCanvas'),ctx=c.getContext('2d');
  await new Promise(r=>{const chk=()=>{if(v.videoWidth>0)r();else requestAnimationFrame(chk);};chk();});
  c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0);
  const img=c.toDataURL('image/jpeg',0.7);
  if(!img||img.length<10000)return captureIntruder();
  let intruders=JSON.parse(localStorage.getItem('intruders')||'[]');
  intruders.unshift({img,time:new Date().toLocaleString(),user:currentUser?.uid});
  if(intruders.length>10)intruders=intruders.slice(0,10);
  localStorage.setItem('intruders',JSON.stringify(intruders));
  stopCamera();
}

// ============================================================
//  CALCULATOR
// ============================================================
window.cPress = function(v){
  resumeAudio();playKey();vibrate(15);lastActivity=Date.now();
  if(v==='C'){calcBuffer='';calcExpr='';calcNewNum=true;updateDisp('0');return;}
  if(v==='M+'){memory+=parseFloat(calcBuffer||0);showToast('M = '+memory);return;}
  if(v==='MR'){calcBuffer=String(memory);calcNewNum=false;updateDisp(calcBuffer);return;}
  if(v==='MC'){memory=0;document.getElementById('calcMem').textContent='';return;}
  if(v==='x²'){const n=parseFloat(calcBuffer||0);calcExpr=calcBuffer+'²';calcBuffer=String(n*n);calcNewNum=true;updateDisp(calcBuffer);return;}
  if(v==='√'){const n=parseFloat(calcBuffer||0);calcExpr='√'+calcBuffer;calcBuffer=String(Math.sqrt(n));calcNewNum=true;updateDisp(calcBuffer);return;}
  if(v==='%'){calcBuffer=String(parseFloat(calcBuffer||0)/100);updateDisp(calcBuffer);return;}
  if(v==='±'){calcBuffer=String(-parseFloat(calcBuffer||0));updateDisp(calcBuffer);return;}
  if(v==='='){
    if(!calcExpr)return;
    try{
      const expr=calcExpr+calcBuffer;
      const res=Function('"use strict";return('+expr.replace(/×/g,'*').replace(/÷/g,'/')+')')();
      const clean=parseFloat(res.toFixed(10));
      calcHistory.unshift({expr:expr+' =',result:clean,time:new Date().toLocaleTimeString()});
      if(calcHistory.length>50)calcHistory.pop();
      if(currentUser)localStorage.setItem('svault_history_'+currentUser.uid,JSON.stringify(calcHistory));
      calcExpr='';calcBuffer=String(clean);calcNewNum=true;
      updateDisp(String(clean));document.getElementById('calcExpr').textContent=expr+' =';
      playSuccess();
    }catch(e){showToast('Error',true);playError();calcBuffer='';calcExpr='';updateDisp('Err');calcNewNum=true;}
    return;
  }
  if(['+','-','*','/'].includes(v)){if(calcBuffer){calcExpr+=calcBuffer;calcBuffer='';}calcExpr+=v==='*'?'×':v==='/'?'÷':v;calcNewNum=true;document.getElementById('calcExpr').textContent=calcExpr;return;}
  if(calcNewNum){calcBuffer='';calcNewNum=false;}
  if(v==='.'&&calcBuffer.includes('.'))return;
  calcBuffer+=v;updateDisp(calcBuffer);document.getElementById('calcExpr').textContent=calcExpr;
  secretBuf=(secretBuf+v).slice(-3);
  if(secretBuf==='777'){
    playVault();vibrate(50);
    pinInput='';updatePinDots();wrongPin=0;pinLocked=false;
    document.getElementById('lockCountdown').textContent='';
    showPage('pinPage');
  }
  if(memory!==0)document.getElementById('calcMem').textContent='M: '+memory;
}
function updateDisp(v){const el=document.getElementById('calcMain');el.textContent=v.length>12?parseFloat(v).toExponential(4):v;el.style.fontSize=v.length>10?'20px':'28px';}

async function checkPin(){
  const uid=currentUser?.uid||'guest';

  if(pinInput===saved){
    playVault();vibrate(60);showPage('vaultPage');loadVault();switchVaultTab('photos');pinInput='';updatePinDots();wrongPin=0;return;
  }
  playError();wrongPin++;vibrate([100,50,100]);
  document.getElementById('pinPad').classList.add('shake');
  setTimeout(()=>document.getElementById('pinPad').classList.remove('shake'),400);
  await new Promise(r=>setTimeout(r,1500));
  try{await initCamera();await new Promise(r=>setTimeout(r,300));await captureIntruder();}catch(e){}

async function loadVault(){
  if(!currentUser||currentUser.isGuest){allPhotos=[];renderGallery();return;}
  showToast('Loading photos...');
  try{
    const q=query(collection(db,'photos'),where('uid','==',currentUser.uid));
    const snap=await getDocs(q);
    allPhotos=[];
    snap.forEach(d=>allPhotos.push({id:d.id,...d.data()}));
    allPhotos.sort((a,b)=>b.createdAt-a.createdAt);
    renderGallery();
  }catch(e){showToast('Load error',true);allPhotos=[];renderGallery();}
}

function renderGallery(){
  const g=document.getElementById('gallery');
  document.getElementById('statCount').textContent=allPhotos.length;
  document.getElementById('statSize').textContent=allPhotos.length+' photos';
  if(!allPhotos.length){g.innerHTML='<div style="text-align:center;opacity:.4;padding:40px;font-size:13px;letter-spacing:2px;grid-column:1/-1">VAULT IS EMPTY</div>';return;}
  g.innerHTML=allPhotos.map((p,i)=>`<div class="photo-thumb" onclick="openViewer(${i})"><img src="${p.data}" loading="lazy" alt="Photo ${i+1}"><button class="del-btn" onclick="event.stopPropagation();deletePhoto(${i})">✕</button></div>`).join('');
}

window.uploadPhotos=function(event){
  const files=event.target.files;
  if(!files||!files.length)return;
  if(!currentUser||currentUser.isGuest)return showToast('Login required',true);
  showToast('Adding photos...');
  const fileArr=Array.from(files);
  let done=0;
  fileArr.forEach(file=>{
    const reader=new FileReader();
    reader.onload=async function(e){
      const img=new Image();
      img.onload=async function(){
        try{
          const canvas=document.createElement('canvas');
          const MAX=500,scale=Math.min(1,MAX/Math.max(img.width,img.height));
          canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
          canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
          const base64=canvas.toDataURL('image/jpeg',0.5);
          await addDoc(collection(db,'photos'),{uid:currentUser.uid,data:base64,createdAt:Date.now()});
          done++;
          if(done===fileArr.length){await loadVault();showToast('Photos added ✅');}
        }catch(err){showToast('Error: '+err.message,true);}
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  event.target.value='';
}

window.deletePhoto=async function(i){

}

async function renderNotes(){
  if(!currentUser||currentUser.isGuest){document.getElementById('notesList').innerHTML='<div style="text-align:center;opacity:.4;padding:20px">Login to save notes</div>';return;}
  try{
    const q=query(collection(db,'notes'),where('uid','==',currentUser.uid));
    const snap=await getDocs(q);
    const notes=[];snap.forEach(d=>notes.push({id:d.id,...d.data()}));
    notes.sort((a,b)=>b.createdAt-a.createdAt);
    const el=document.getElementById('notesList');
    if(!notes.length){el.innerHTML='<div style="text-align:center;opacity:.4;padding:20px">NO NOTES YET</div>';return;}
    el.innerHTML=notes.map(n=>`<div class="note-item"><button class="note-del" onclick="deleteNote('${n.id}')">✕</button><div class="note-title">${escHtml(n.title||'')}</div><div class="note-body">${escHtml(n.body||'')}</div><div style="font-size:11px;opacity:.4">${n.time}</div></div>`).join('');
  }catch(e){showToast('Load error',true);}
}

window.saveNote=async function(){
  if(!currentUser||currentUser.isGuest)return showToast('Login required',true);
  const title=document.getElementById('noteTitle').value.trim();
  const body=document.getElementById('noteBody').value.trim();
  if(!title&&!body)return;
  try{
    await addDoc(collection(db,'notes'),{uid:currentUser.uid,title,body,time:new Date().toLocaleString(),createdAt:Date.now()});
    document.getElementById('noteTitle').value='';document.getElementById('noteBody').value='';
    renderNotes();showToast('Note saved');
  }catch(e){showToast('Save error',true);}
}

window.deleteNote=async function(id){
  try{await deleteDoc(doc(db,'notes',id));renderNotes();playClick();showToast('Note deleted');}catch(e){showToast('Error',true);}
}

// ============================================================
//  MISC
// ============================================================
window.toggleTheme=function(){document.body.classList.toggle('light-theme');playClick();}
window.backToCalc=function(){playClick();showPage('calcPage');}

document.addEventListener('click',()=>{lastActivity=Date.now();resumeAudio();});
setInterval(()=>{
  if(!settings.autoLogout||!currentUser)return;
  if(Date.now()-lastActivity>120000){showToast('Auto-logged out');doLogout();}
},5000);

// Unregister old service workers
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}

</script>
</body>
